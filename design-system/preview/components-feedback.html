<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px; background: var(--bg-page); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .card { background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 16px; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 10px; }
  .row { display: flex; gap: 10px; align-items: center; padding: 6px 0; }
  .sk { background: linear-gradient(90deg, var(--bg-subtle) 25%, var(--bg-inset) 50%, var(--bg-subtle) 75%); background-size: 200% 100%; animation: shimmer 1.5s ease-in-out infinite; border-radius: 4px; }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  .avatar { width: 36px; height: 36px; border-radius: 9999px; flex-shrink: 0; }
  .lines { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .succ { display: flex; gap: 12px; align-items: center; padding: 10px 14px; background: var(--inward-bg); border: 1px solid var(--inward-border); border-radius: var(--radius-md); color: var(--inward); font-family: var(--font-body); font-size: 14px; font-weight: 500; }
  .err { display: flex; gap: 12px; align-items: flex-start; padding: 10px 14px; background: var(--outward-bg); border: 1px solid var(--outward-border); border-radius: var(--radius-md); color: var(--outward); font-family: var(--font-body); font-size: 13px; }
  .err b { display: block; font-weight: 600; margin-bottom: 2px; }
</style>
</head>
<body>
  <div class="grid">
    <div class="card">
      <div class="label">Skeleton loading</div>
      <div class="row"><div class="sk avatar"></div><div class="lines"><div class="sk" style="height:12px;width:60%"></div><div class="sk" style="height:10px;width:40%"></div></div></div>
      <div class="row"><div class="sk avatar"></div><div class="lines"><div class="sk" style="height:12px;width:75%"></div><div class="sk" style="height:10px;width:35%"></div></div></div>
      <div class="row"><div class="sk avatar"></div><div class="lines"><div class="sk" style="height:12px;width:55%"></div><div class="sk" style="height:10px;width:45%"></div></div></div>
    </div>
    <div class="card">
      <div class="label">Toasts · feedback</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div class="succ">✓<span>240 bags recorded</span></div>
        <div class="err">⚠<span><b>Couldn't save</b>Check your internet and try again.</span></div>
        <div class="succ" style="background:var(--pending-bg); border-color:var(--pending-border); color:var(--pending);">⚡<span>You're offline. Entry saved, will upload when connected.</span></div>
      </div>
    </div>
  </div>
</body>
</html>
