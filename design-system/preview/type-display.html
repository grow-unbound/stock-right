<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px; background: var(--bg-page); }
  .row { display: flex; align-items: baseline; gap: 24px; padding: 14px 0; border-bottom: 1px solid var(--border-default); }
  .row:last-child { border-bottom: 0; }
  .meta { width: 140px; flex-shrink: 0; }
  .name { font-family: var(--font-mono); font-size: 11px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.06em; text-transform: uppercase; }
  .specs { font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); margin-top: 4px; }
</style>
</head>
<body>
  <div class="row"><div class="meta"><div class="name">Display</div><div class="specs">Serif · 48 / 700</div></div><div style="font-family: var(--font-display); font-size: 48px; font-weight: 700; line-height: 1.1; letter-spacing: -0.01em;">Stock recorded today</div></div>
  <div class="row"><div class="meta"><div class="name">H1</div><div class="specs">Serif · 38 / 600</div></div><div style="font-family: var(--font-display); font-size: 38px; font-weight: 600; line-height: 1.15;">Today's inward register</div></div>
  <div class="row"><div class="meta"><div class="name">H2</div><div class="specs">Serif · 30 / 600</div></div><div style="font-family: var(--font-display); font-size: 30px; font-weight: 600;">Cold Storage 3 — Lot AP-1247</div></div>
  <div class="row"><div class="meta"><div class="name">H3</div><div class="specs">Serif · 24 / 500</div></div><div style="font-family: var(--font-display); font-size: 24px; font-weight: 500;">Recent parties</div></div>
</body>
</html>
