<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px; background: var(--bg-page); display: flex; gap: 24px; align-items: center; justify-content: center; }
  .phone { width: 280px; background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: 16px; padding: 14px 14px 0; position: relative; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px; text-align: center; }
  .tabbar { display: flex; justify-content: space-around; background: var(--bg-surface); border-top: 1px solid var(--border-default); padding: 8px 6px 12px; position: relative; margin: 0 -14px; gap: 4px; }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 3px; flex: 1; font-family: var(--font-body); font-size: 11px; color: var(--text-tertiary); font-weight: 500; padding: 6px 4px; border-radius: 10px; }
  .tab.active { background: var(--brand-subtle); color: var(--brand-text); font-weight: 600; }
  .tab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .fab-slot { flex: 0 0 60px; display: flex; justify-content: center; align-items: flex-start; }
  .fab { width: 48px; height: 48px; border-radius: 9999px; background: var(--brand-ui); display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: 300; box-shadow: 0 4px 12px rgba(28, 26, 22, 0.18); margin-top: -16px; }
  .sidenav { width: 200px; background: var(--bg-subtle); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 12px 8px; }
  .item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; font-family: var(--font-body); font-size: 13px; font-weight: 500; color: var(--text-secondary); border-radius: 10px; margin-bottom: 2px; }
  .item:hover { background: var(--bg-inset); color: var(--text-primary); }
  .item.active { background: var(--brand-subtle); color: var(--brand-text); font-weight: 600; }
  .item svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="phone">
    <div class="label">Mobile · bottom tabs</div>
    <div style="height:90px;background:var(--bg-subtle);border-radius:6px;margin-bottom:14px;"></div>
    <div class="tabbar">
      <div class="tab active"><svg viewBox="0 0 24 24"><path d="M3 7l9-4 9 4M5 9v11h14V9"/></svg>Stock</div>
      <div class="tab"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M15 11a3 3 0 100-6 3 3 0 000 6zM3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>Parties</div>
      <div class="fab-slot"><div class="fab">+</div></div>
      <div class="tab"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11H3z"/></svg>Home</div>
      <div class="tab"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 00-.4-2.3l2-1.5-2-3.4-2.3.9a7 7 0 00-4-2.3L11.6 1h-4l-.7 2.4a7 7 0 00-4 2.3l-2.3-.9-2 3.4 2 1.5A7 7 0 0 0 0 12"/></svg>Settings</div>
    </div>
  </div>
  <div class="sidenav">
    <div class="label" style="margin-bottom: 0; padding: 0 12px 10px; text-align:left;">Desktop · side nav (flat)</div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11H3z"/></svg>Home</div>
    <div class="item active"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>Stock</div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Parties</div>
    <div class="item"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>Money</div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>Preferences</div>
  </div>
</body>
</html>
