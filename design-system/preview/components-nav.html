<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px; background: var(--bg-page); display: flex; gap: 24px; align-items: center; justify-content: center; }
  .phone { width: 280px; background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: 16px; padding: 14px 14px 0; position: relative; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 12px; text-align: center; }
  .tabbar { display: flex; justify-content: space-around; background: var(--bg-surface); border-top: 1px solid var(--border-default); padding: 8px 0 12px; position: relative; margin: 0 -14px; }
  .tab { display: flex; flex-direction: column; align-items: center; gap: 2px; flex: 1; font-family: var(--font-body); font-size: 11px; color: var(--text-tertiary); }
  .tab.active { color: var(--brand-ui); font-weight: 600; }
  .tab svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
  .fab-slot { flex: 0 0 60px; display: flex; justify-content: center; align-items: flex-start; }
  .fab { width: 48px; height: 48px; border-radius: 9999px; background: var(--brand-ui); display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; font-weight: 300; box-shadow: 0 4px 12px rgba(28, 26, 22, 0.18); margin-top: -16px; }
  .sidenav { width: 200px; background: var(--bg-subtle); border: 1px solid var(--border-default); border-radius: var(--radius-md); padding: 12px 0; }
  .group { font-family: var(--font-mono); font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-tertiary); padding: 10px 16px 4px; }
  .item { display: flex; align-items: center; gap: 10px; padding: 8px 16px; font-family: var(--font-body); font-size: 13px; color: var(--text-primary); }
  .item.active { background: var(--brand-ui); color: white; margin: 0 8px; border-radius: var(--radius-sm); padding: 8px; }
  .item svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 1.6; stroke-linecap: round; stroke-linejoin: round; }
</style>
</head>
<body>
  <div class="phone">
    <div class="label">Mobile · bottom tabs</div>
    <div style="height:90px;background:var(--bg-subtle);border-radius:6px;margin-bottom:14px;"></div>
    <div class="tabbar">
      <div class="tab active"><svg viewBox="0 0 24 24"><path d="M3 7l9-4 9 4M5 9v11h14V9"/></svg>Stock</div>
      <div class="tab"><svg viewBox="0 0 24 24"><circle cx="9" cy="8" r="3"/><path d="M15 11a3 3 0 100-6 3 3 0 000 6zM3 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>Parties</div>
      <div class="fab-slot"><div class="fab">+</div></div>
      <div class="tab"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11H3z"/></svg>Home</div>
      <div class="tab"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 00-.4-2.3l2-1.5-2-3.4-2.3.9a7 7 0 00-4-2.3L11.6 1h-4l-.7 2.4a7 7 0 00-4 2.3l-2.3-.9-2 3.4 2 1.5A7 7 0 0 0 0 12"/></svg>Settings</div>
    </div>
  </div>
  <div class="sidenav">
    <div class="label" style="margin-bottom: 0; padding: 0 16px 10px; text-align:left;">Desktop · 200px side nav</div>
    <div class="group">Operations</div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M3 7l9-4 9 4M5 9v11h14V9"/></svg>Stock</div>
    <div class="item active"><svg viewBox="0 0 24 24"><path d="M12 3v18M3 12h18"/></svg>Inward</div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M21 12H3M14 5l7 7-7 7"/></svg>Outward</div>
    <div class="group">Finance</div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Collection</div>
    <div class="group">Reports</div>
    <div class="item"><svg viewBox="0 0 24 24"><path d="M3 3v18h18M7 14l4-4 4 4 5-5"/></svg>Daily register</div>
  </div>
</body>
</html>
