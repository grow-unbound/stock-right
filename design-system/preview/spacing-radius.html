<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px; background: var(--bg-page); }
  .row { display: flex; gap: 16px; align-items: center; }
  .demo { display: flex; flex-direction: column; align-items: center; gap: 10px; flex: 1; }
  .box { background: var(--bg-surface); border: 1px solid var(--border-default); width: 100%; height: 70px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); letter-spacing: 0.04em; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
  .pill { background: var(--brand-ui); color: white; padding: 6px 14px; font-family: var(--font-body); font-size: 12px; font-weight: 500; display: inline-block; }
</style>
</head>
<body>
  <div class="row">
    <div class="demo"><div class="box" style="border-radius:4px"></div><div class="label">radius-sm</div><div class="px">4px · chips</div></div>
    <div class="demo"><div class="box" style="border-radius:8px"></div><div class="label">radius-md</div><div class="px">8px · default</div></div>
    <div class="demo"><div class="box" style="border-radius:12px"></div><div class="label">radius-lg</div><div class="px">12px · sheets</div></div>
    <div class="demo"><div class="box" style="border-radius:16px"></div><div class="label">radius-xl</div><div class="px">16px · bottom sheets</div></div>
    <div class="demo"><div class="box" style="border-radius:9999px; height:48px; width:48px; align-self:center;"></div><div class="label">radius-pill</div><div class="px">9999 · FAB / badge</div></div>
  </div>
</body>
</html>
