<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px; background: var(--bg-page); display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: center; }
  .light, .dark { padding: 30px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; min-height: 140px; }
  .light { background: #FEFCF8; border: 1px solid #E5DED2; }
  .dark { background: #12100B; }
  .lockup { display: inline-flex; align-items: center; gap: 12px; }
  .mark { width: 32px; height: 32px; border-radius: 9999px; position: relative; }
  .mark.l { background: #C8712A; }
  .mark.l::after { content: ''; position: absolute; inset: 11px; border-radius: 9999px; background: #FEFCF8; }
  .mark.d { background: #E8943A; }
  .mark.d::after { content: ''; position: absolute; inset: 11px; border-radius: 9999px; background: #12100B; }
  .word { font-family: var(--font-display); font-size: 32px; font-weight: 600; letter-spacing: -0.005em; }
  .word.l { color: #1C1A16; }
  .word.d { color: #F0EBE0; }
  .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; position: absolute; bottom: 10px; left: 14px; color: var(--text-tertiary); }
  .light .label, .dark .label { position: relative; bottom: auto; left: auto; }
  .stack { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; }
</style>
</head>
<body>
  <div class="light"><div class="stack"><div class="label">Light · placeholder</div><div class="lockup"><span class="mark l"></span><span class="word l">StockRight</span></div></div></div>
  <div class="dark"><div class="stack"><div class="label" style="color:#8A7F6E">Dark · placeholder</div><div class="lockup"><span class="mark d"></span><span class="word d">StockRight</span></div></div></div>
</body>
</html>
