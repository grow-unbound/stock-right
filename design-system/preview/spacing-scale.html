<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 24px; background: var(--bg-page); }
  .scale { display: flex; align-items: flex-end; gap: 12px; }
  .step { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { background: var(--brand-subtle); border: 1px solid var(--brand-border); border-radius: var(--radius-sm); }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary); }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--text-tertiary); }
</style>
</head>
<body>
  <div class="scale">
    <div class="step"><div class="box" style="width:4px;height:4px"></div><div class="label">sp-1</div><div class="px">4</div></div>
    <div class="step"><div class="box" style="width:8px;height:8px"></div><div class="label">sp-2</div><div class="px">8</div></div>
    <div class="step"><div class="box" style="width:12px;height:12px"></div><div class="label">sp-3</div><div class="px">12</div></div>
    <div class="step"><div class="box" style="width:16px;height:16px"></div><div class="label">sp-4</div><div class="px">16</div></div>
    <div class="step"><div class="box" style="width:20px;height:20px"></div><div class="label">sp-5</div><div class="px">20</div></div>
    <div class="step"><div class="box" style="width:24px;height:24px"></div><div class="label">sp-6</div><div class="px">24</div></div>
    <div class="step"><div class="box" style="width:32px;height:32px"></div><div class="label">sp-8</div><div class="px">32</div></div>
    <div class="step"><div class="box" style="width:40px;height:40px"></div><div class="label">sp-10</div><div class="px">40</div></div>
    <div class="step"><div class="box" style="width:48px;height:48px"></div><div class="label">sp-12</div><div class="px">48</div></div>
    <div class="step"><div class="box" style="width:64px;height:64px"></div><div class="label">sp-16</div><div class="px">64</div></div>
  </div>
</body>
</html>
