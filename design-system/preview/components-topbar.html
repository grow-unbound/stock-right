<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { padding: 0; background: var(--bg-page); margin: 24px; }
  .topbar { background: var(--bg-surface); border: 1px solid var(--border-default); border-radius: var(--radius-md); height: 52px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
  .word { font-family: var(--font-display); font-size: 20px; font-weight: 600; color: var(--text-primary); display: flex; align-items: center; gap: 10px; }
  .dot { width: 14px; height: 14px; border-radius: 9999px; background: var(--brand-ui); position: relative; }
  .dot::after { content: ''; position: absolute; inset: 4px; background: var(--bg-surface); border-radius: 9999px; }
  .right { display: flex; gap: 10px; align-items: center; }
  .badge { display: inline-flex; align-items: center; gap: 6px; padding: 3px 9px; border-radius: 9999px; font-family: var(--font-body); font-size: 12px; font-weight: 500; border: 1px solid; }
  .b-online { background: var(--inward-bg); color: var(--inward); border-color: var(--inward-border); }
  .b-offline { background: var(--pending-bg); color: var(--pending); border-color: var(--pending-border); }
  .btn { background: var(--brand-ui); color: white; height: 32px; padding: 0 14px; border-radius: var(--radius-md); border: none; font-family: var(--font-body); font-size: 13px; font-weight: 500; }

  .stack { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
</style>
</head>
<body>
  <div class="stack">
    <div class="topbar">
      <div class="word"><span class="dot"></span>StockRight</div>
      <div class="right"><span class="badge b-online">● Online</span><button class="btn">+ Inward</button></div>
    </div>
    <div class="topbar">
      <div class="word"><span class="dot"></span>StockRight</div>
      <div class="right"><span class="badge b-offline">⚡ 3 queued</span><button class="btn">+ Inward</button></div>
    </div>
  </div>
</body>
</html>
